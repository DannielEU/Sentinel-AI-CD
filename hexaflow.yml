# ─────────────────────────────────────────────────────────────────────────────
# HexaFlow Security Gate — workflow reutilizable
# ─────────────────────────────────────────────────────────────────────────────
# Copia este archivo a .github/workflows/hexaflow.yml en CUALQUIER proyecto
# que tenga un Dockerfile. No requiere dependencias externas.
#
# Configuración en el repo destino (Settings → Variables / Secrets):
#
#   Variables (vars.*):
#     HEXAFLOW_GATE_URL    URL del gate desplegado
#                          default: https://sentinelia-avd7b2gabqe3b2g8.brazilsouth-01.azurewebsites.net
#     HEXAFLOW_AI_ENABLED  "true" | "false"   (default: "true")
#     HEXAFLOW_DOCKERFILE  ruta al Dockerfile  (default: "Dockerfile")
#                          ejemplos: "docker/Dockerfile", "frontend/Dockerfile"
#
#   Secrets (secrets.*):
#     HEXAFLOW_TOKEN       Bearer token de autenticación del gate
# ─────────────────────────────────────────────────────────────────────────────

name: HexaFlow Security Gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  hexaflow:
    name: Trivy → HexaFlow Gate
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Resolver configuración con fallbacks seguros ──────────────────────
      # Se usan variables de shell (${VAR:-default}) en lugar de expresiones
      # GHA para garantizar que los fallbacks funcionen aunque la variable
      # no esté definida en Settings → Variables.
      - name: Resolve config
        id: config
        env:
          _GATE_URL:    ${{ vars.HEXAFLOW_GATE_URL }}
          _AI_ENABLED:  ${{ vars.HEXAFLOW_AI_ENABLED }}
          _DOCKERFILE:  ${{ vars.HEXAFLOW_DOCKERFILE }}
        run: |
          GATE_URL="${_GATE_URL:-https://sentinelia-avd7b2gabqe3b2g8.brazilsouth-01.azurewebsites.net}"
          AI_ENABLED="${_AI_ENABLED:-true}"

          # --- Resolver ruta del Dockerfile ------------------------------------
          # Prioridad:
          #   1. Variable HEXAFLOW_DOCKERFILE definida en Settings → Variables
          #   2. Dockerfile en la raíz del repo
          #   3. Búsqueda automática (excluye node_modules/vendor/.git)
          # El contexto de build es SIEMPRE "." para que los COPY
          # del Dockerfile encuentren todos los archivos del proyecto.
          if [ -n "$_DOCKERFILE" ]; then
            if [ -f "$_DOCKERFILE" ]; then
              DOCKERFILE="$_DOCKERFILE"
            else
              echo "❌ HEXAFLOW_DOCKERFILE='${_DOCKERFILE}' no existe en el repo."
              echo "   Dockerfiles encontrados:"
              find . -name "Dockerfile" -not -path "*/node_modules/*" -not -path "*/vendor/*" | sort
              exit 1
            fi
          elif [ -f "Dockerfile" ]; then
            DOCKERFILE="Dockerfile"
          else
            DOCKERFILE=$(find . -maxdepth 4 -name "Dockerfile" \
              -not -path "*/node_modules/*" \
              -not -path "*/vendor/*" \
              -not -path "*/.git/*" \
              | sort | head -1 | sed 's|^\./||')
            if [ -z "$DOCKERFILE" ]; then
              echo "❌ No se encontró ningún Dockerfile en el repositorio."
              exit 1
            fi
            echo "ℹ️  Dockerfile detectado automáticamente: ${DOCKERFILE}"
          fi

          echo "gate_url=${GATE_URL}"     >> "$GITHUB_OUTPUT"
          echo "ai_enabled=${AI_ENABLED}" >> "$GITHUB_OUTPUT"
          echo "dockerfile=${DOCKERFILE}" >> "$GITHUB_OUTPUT"

          echo "Gate URL   : ${GATE_URL}"
          echo "AI enabled : ${AI_ENABLED}"
          echo "Dockerfile : ${DOCKERFILE}"

      # ── 3. Nombre de imagen en minúsculas ────────────────────────────────────
      - name: Set image name
        id: vars
        run: |
          IMAGE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # ── 4. Build Docker image ────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            -t "${{ steps.vars.outputs.image }}" \
            -f "${{ steps.config.outputs.dockerfile }}" \
            .

      # ── 5. Instalar Trivy ────────────────────────────────────────────────────
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      # ── 6. Escanear con Trivy ────────────────────────────────────────────────
      - name: Scan with Trivy
        run: |
          trivy image \
            --format json \
            --output trivy_report.json \
            --exit-code 0 \
            "${{ steps.vars.outputs.image }}"

          echo ""
          echo "── Trivy table summary ──"
          trivy image --format table --exit-code 0 "${{ steps.vars.outputs.image }}"

      # ── 7. Enviar al HexaFlow Gate ───────────────────────────────────────────
      - name: Send to HexaFlow Gate
        id: gate
        env:
          IMAGE_NAME:       ${{ steps.vars.outputs.image }}
          HEXAFLOW_GATE_URL: ${{ steps.config.outputs.gate_url }}
          HEXAFLOW_TOKEN:   ${{ secrets.HEXAFLOW_TOKEN }}
          HEXAFLOW_AI_ENABLED: ${{ steps.config.outputs.ai_enabled }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, urllib.request, urllib.error

          # ── Leer reporte Trivy ──────────────────────────────────────────────
          with open("trivy_report.json") as f:
              trivy = json.load(f)

          counts = {"critical": 0, "high": 0, "medium": 0, "low": 0, "unknown": 0}
          for result in trivy.get("Results", []):
              for vuln in result.get("Vulnerabilities") or []:
                  sev = vuln.get("Severity", "unknown").lower()
                  if sev in counts:
                      counts[sev] += 1

          metadata = trivy.get("Metadata", {})
          size_mb  = metadata.get("Size", 0) // (1024 * 1024) if metadata.get("Size") else 0
          os_info  = metadata.get("OS", {})
          os_family = os_info.get("Family", "unknown")

          image_name  = os.environ["IMAGE_NAME"]
          gate_url    = os.environ.get("HEXAFLOW_GATE_URL", "").rstrip("/")
          token       = os.environ.get("HEXAFLOW_TOKEN", "")
          ai_enabled  = os.environ.get("HEXAFLOW_AI_ENABLED", "true").lower() == "true"

          payload = {
              "image_name":    image_name,
              "image_size_mb": size_mb if size_mb > 0 else 1,
              "vulnerabilities": counts,
              "base_image":    trivy.get("ArtifactName", "unknown"),
              "os_family":     os_family,
          }

          headers = {"Content-Type": "application/json"}
          if token:
              headers["Authorization"] = f"Bearer {token}"

          print(f"Gate URL   : {gate_url}")
          print(f"Image      : {image_name}")
          print(f"AI enabled : {ai_enabled}")
          print(f"Vulns      : {counts}")
          print()

          endpoint = f"{gate_url}/analyze-image"
          req = urllib.request.Request(
              endpoint,
              data=json.dumps(payload).encode(),
              headers=headers,
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  response = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Gate HTTP error {e.code}: {body}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
                  gh.write("gate_decision=ERROR\ngate_exit=3\n")
              sys.exit(3)
          except Exception as e:
              print(f"Gate connection error: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
                  gh.write("gate_decision=ERROR\ngate_exit=3\n")
              sys.exit(3)

          decision = response.get("decision", "ERROR")
          reason   = response.get("reason", "")
          source   = response.get("source", "rule_engine")

          print(f"Decision : {decision}")
          print(f"Source   : {source}")
          print(f"Reason   : {reason[:200]}")

          with open("gate_response.json", "w") as f:
              json.dump(response, f, indent=2)

          exit_code = {"APPROVED": 0, "WARNING": 2, "REJECTED": 1}.get(decision, 3)

          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"gate_decision={decision}\n")
              gh.write(f"gate_exit={exit_code}\n")
          PYEOF

      # ── 8. Construir comentario de PR ────────────────────────────────────────
      - name: Build PR comment
        if: always()
        env:
          GATE_DECISION:       ${{ steps.gate.outputs.gate_decision }}
          IMAGE_NAME:          ${{ steps.vars.outputs.image }}
          HEXAFLOW_AI_ENABLED: ${{ steps.config.outputs.ai_enabled }}
          HEXAFLOW_GATE_URL:   ${{ steps.config.outputs.gate_url }}
        run: |
          python3 << 'PYEOF'
          import json, os, datetime
          from collections import Counter

          decision   = os.environ.get("GATE_DECISION", "UNKNOWN")
          image_name = os.environ.get("IMAGE_NAME", "-")
          ai_enabled = os.environ.get("HEXAFLOW_AI_ENABLED", "true").lower() == "true"
          gate_url   = os.environ.get("HEXAFLOW_GATE_URL", "")
          ts         = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          try:
              with open("trivy_report.json") as f:
                  data = json.load(f)
          except Exception:
              data = {}

          counts    = Counter()
          crit_high = []
          for result in data.get("Results", []):
              for v in result.get("Vulnerabilities") or []:
                  sev = v.get("Severity", "UNKNOWN").upper()
                  counts[sev] += 1
                  if sev in ("CRITICAL", "HIGH"):
                      crit_high.append({
                          "id":    v.get("VulnerabilityID", "-"),
                          "sev":   sev,
                          "pkg":   v.get("PkgName", "-"),
                          "ver":   v.get("InstalledVersion", "-"),
                          "fixed": v.get("FixedVersion", "—"),
                          "title": v.get("Title", "")[:80],
                      })

          icon      = {"APPROVED": "✅", "WARNING": "⚠️", "REJECTED": "❌"}.get(decision, "❓")
          ai_status = "habilitada" if ai_enabled else "deshabilitada"

          lines = [
              f"## {icon} HexaFlow Security Gate — {decision}",
              f"_`{image_name}` · {ts} · IA: {ai_status}_",
              "",
              "### Resumen de vulnerabilidades",
              "",
              "| Severidad | Total |",
              "|-----------|-------|",
              f"| 🔴 Critical | **{counts.get('CRITICAL', 0)}** |",
              f"| 🟠 High     | **{counts.get('HIGH', 0)}** |",
              f"| 🟡 Medium   | {counts.get('MEDIUM', 0)} |",
              f"| 🔵 Low      | {counts.get('LOW', 0)} |",
              f"| ⚪ Unknown  | {counts.get('UNKNOWN', 0)} |",
          ]

          if crit_high:
              lines += [
                  "",
                  "### 🔴🟠 Critical & High — acción requerida",
                  "",
                  "| CVE | Sev | Paquete | Instalado | Fix disponible | Descripción |",
                  "|-----|-----|---------|-----------|----------------|-------------|",
              ]
              for r in crit_high[:25]:
                  lines.append(
                      f"| `{r['id']}` | {r['sev']} | `{r['pkg']}` "
                      f"| {r['ver']} | {r['fixed']} | {r['title']} |"
                  )
              if len(crit_high) > 25:
                  lines.append(f"_…y {len(crit_high) - 25} más — ver artefacto completo._")

          try:
              with open("gate_response.json") as f:
                  gr = json.load(f)
              reason  = gr.get("reason", "")
              recs    = gr.get("recommendations", [])
              summary = gr.get("summary", "")
              source  = gr.get("source", "rule_engine")

              header = "### 🤖 Análisis IA" if source == "ai_model" else "### 📋 Rule Engine"
              if reason or recs or summary:
                  lines += ["", header]
                  if reason:
                      lines += ["", f"**Análisis:** {reason}"]
                  if recs:
                      lines += ["", "**Recomendaciones:**"]
                      for i, r in enumerate(recs, 1):
                          lines.append(f"  {i}. {r}")
                  if summary:
                      lines += ["", f"> {summary}"]
          except Exception:
              pass

          if decision == "REJECTED":
              lines += [
                  "",
                  "> **Despliegue bloqueado.** Corrige todas las vulnerabilidades Critical antes de mergear.",
              ]
          elif decision == "WARNING":
              lines += [
                  "",
                  "> Despliegue permitido con advertencias. Abre un ticket de remediación para los hallazgos High/Medium.",
              ]

          if gate_url:
              lines += ["", "---", f"_Gate: {gate_url}_"]

          with open("pr_comment.md", "w") as f:
              f.write("\n".join(lines))

          print("pr_comment.md escrito correctamente.")
          PYEOF

      # ── 9. Publicar comentario en el PR ──────────────────────────────────────
      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: pr_comment.md

      # ── 10. Subir artefactos ─────────────────────────────────────────────────
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hexaflow-security-report-${{ github.sha }}
          path: |
            trivy_report.json
            pr_comment.md
            gate_response.json
          retention-days: 30

      # ── 11. Aplicar decisión del gate ────────────────────────────────────────
      - name: Enforce gate decision
        if: always()
        run: |
          EXIT="${{ steps.gate.outputs.gate_exit }}"
          DECISION="${{ steps.gate.outputs.gate_decision }}"

          case "$EXIT" in
            0) echo "✅ APPROVED — despliegue autorizado." ;;
            2) echo "⚠️  WARNING — despliegue permitido con advertencias." ;;
            1) echo "❌ REJECTED — despliegue bloqueado."; exit 1 ;;
            3) echo "❌ ERROR del gate — fallando de forma segura."; exit 1 ;;
            *) echo "❓ Resultado desconocido (exit=$EXIT, decision=$DECISION) — fallando."; exit 1 ;;
          esac
