# Sentinel-AI-CD — Docker Compose
# Compatible: Local, Docker Compose, Azure Container Instances, Azure App Service, K8s
#
# Key variables:
#   AI_PROVIDER      : ollama (default) | openai | anthropic | disabled
#   DATABASE_URL     : sqlite+aiosqlite:///./data/sentinel.db  (empty = no DB)
#   GATE_AUTH_TOKEN  : bearer token for API auth (optional)
#   OLLAMA_MODEL     : mistral (default)
#   OPENAI_API_KEY   : required when AI_PROVIDER=openai
#   ANTHROPIC_API_KEY: required when AI_PROVIDER=anthropic

services:

  # ── Ollama — Local LLM Server ─────────────────────────────────────────────
  # Only needed when AI_PROVIDER=ollama (default).
  # Skip or disable when using openai / anthropic providers.
  ollama:
    image: ollama/ollama:latest
    container_name: devsecops-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ${OLLAMA_DATA_PATH:-./ollama-data}:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m

  # ── Sentinel Gate — FastAPI Service ───────────────────────────────────────
  gate:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: devsecops-gate
    restart: unless-stopped
    ports:
      - "${GATE_PORT:-8000}:8000"
    volumes:
      - sentinel-data:/app/data      # Persistent SQLite storage
    environment:
      # ── AI Provider ──────────────────────────────────────────────────────
      # Options: ollama | openai | anthropic | disabled
      - AI_PROVIDER=${AI_PROVIDER:-ollama}

      # Ollama (used when AI_PROVIDER=ollama)
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}

      # OpenAI (used when AI_PROVIDER=openai)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}

      # Anthropic (used when AI_PROVIDER=anthropic)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}

      # ── Database ─────────────────────────────────────────────────────────
      # Leave empty to run without persistence (no history, no whitelist).
      # SQLite:     sqlite+aiosqlite:///./data/sentinel.db
      # PostgreSQL: postgresql+asyncpg://user:pass@host:5432/dbname
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/sentinel.db}

      # ── Auth & Security ───────────────────────────────────────────────────
      - GATE_AUTH_TOKEN=${GATE_AUTH_TOKEN:-}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - AUTH_FAILURE_LIMIT=${AUTH_FAILURE_LIMIT:-5}
      - AUTH_FAILURE_WINDOW=${AUTH_FAILURE_WINDOW:-300}

      # ── Rule Engine Thresholds ────────────────────────────────────────────
      - MAX_IMAGE_SIZE_MB=${MAX_IMAGE_SIZE_MB:-1200}
      - MAX_HIGH_VULNS=${MAX_HIGH_VULNS:-10}
      - MAX_MEDIUM_VULNS=${MAX_MEDIUM_VULNS:-30}

    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/health', timeout=4); sys.exit(0 if r.status == 200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sentinel-data:
    driver: local
