# Sentinel-AI-CD вЂ” Docker Compose LOCAL
# ======================================
# Uso exclusivo para pruebas en mГЎquina local.
# Para producciГіn/CD usa el docker-compose.yml de la raГ­z del proyecto.
#
# Servicios incluidos:
#   ollama   вЂ” LLM local (IA)
#   gate     вЂ” API FastAPI de Sentinel
#   db       вЂ” PostgreSQL (activar con: --profile postgres)
#
# Inicio rГЎpido:
#   cp .env.example .env
#   docker compose up -d
#   docker exec sentinel-local-ollama ollama pull mistral
#
# Con PostgreSQL:
#   docker compose --profile postgres up -d
#
# Ver logs:
#   docker compose logs -f gate

services:

  # в”Ђв”Ђ Ollama вЂ” LLM Local в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  ollama:
    image: ollama/ollama:latest
    container_name: sentinel-local-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=10m

  # в”Ђв”Ђ Sentinel Gate вЂ” FastAPI в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  gate:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: sentinel-local-gate
    restart: unless-stopped
    ports:
      - "${GATE_PORT:-8000}:8000"
    volumes:
      - sentinel-data:/app/data
    environment:
      # в”Ђв”Ђ IA в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}

      # в”Ђв”Ђ Base de datos в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      # SQLite (default, sin servicios extra):
      #   sqlite+aiosqlite:///./data/sentinel.db
      # PostgreSQL (requiere --profile postgres):
      #   postgresql+asyncpg://sentinel:sentinel@db:5432/sentinel
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./data/sentinel.db}

      # в”Ђв”Ђ Auth y seguridad в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - GATE_AUTH_TOKEN=${GATE_AUTH_TOKEN:-}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-200}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - AUTH_FAILURE_LIMIT=${AUTH_FAILURE_LIMIT:-10}
      - AUTH_FAILURE_WINDOW=${AUTH_FAILURE_WINDOW:-300}

      # в”Ђв”Ђ Umbrales del motor de reglas в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - MAX_IMAGE_SIZE_MB=${MAX_IMAGE_SIZE_MB:-1200}
      - MAX_HIGH_VULNS=${MAX_HIGH_VULNS:-10}
      - MAX_MEDIUM_VULNS=${MAX_MEDIUM_VULNS:-30}

    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request, sys; r = urllib.request.urlopen('http://localhost:8000/health', timeout=4); sys.exit(0 if r.status == 200 else 1)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  # в”Ђв”Ђ PostgreSQL вЂ” Base de datos persistente (opcional) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Activar con: docker compose --profile postgres up -d
  # Luego cambiar DATABASE_URL en .env a:
  #   postgresql+asyncpg://sentinel:sentinel@db:5432/sentinel
  db:
    image: postgres:16-alpine
    container_name: sentinel-local-db
    profiles: [postgres]
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sentinel}
      - POSTGRES_DB=${POSTGRES_DB:-sentinel}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollama-data:
  sentinel-data:
  postgres-data:
